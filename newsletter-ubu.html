<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>*|MC:SUBJECT|*</title>
  <style type="text/css">
    body, table, td { font-family: Arial, Helvetica, sans-serif; font-size: 16px; color: #333333; }
    body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
    a { color: #007C89; text-decoration: underline; }
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; }
      .fluid { max-width: 100% !important; height: auto !important; }
      .stack-column { display: block !important; width: 100% !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4;">

  <!-- Preview Text -->
  <div style="display: none; max-height: 0; overflow: hidden;">
    Preview text shown in inbox before opening.
  </div>

  <!-- Email Wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4;">
    <tr>
      <td align="center" style="padding: 20px 10px;">

        <!-- Email Container -->
        <table role="presentation" class="email-container" width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff;">

          <!-- Header -->
          <tr>
            <td style="padding: 30px 40px; text-align: center; background-color: #007C89;">
              <img src="https://via.placeholder.com/200x50" alt="Logo" width="200" style="max-width: 200px;">
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 40px;">
              <h1 style="margin: 0 0 20px; font-size: 24px; color: #333333;">Your Headline Here</h1>
              <p style="margin: 0 0 20px; line-height: 1.6;">
                Email body content goes here. Use Mailchimp merge tags like *|FNAME|* for personalization.
              </p>
              <!-- CTA Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 30px 0;">
                <tr>
                  <td style="border-radius: 4px; background-color: #007C89;">
                    <a href="https://" target="_blank" style="display: inline-block; padding: 14px 30px; color: #ffffff; text-decoration: none; font-weight: bold;">Call to Action</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 30px 40px; background-color: #f4f4f4; font-size: 12px; color: #999999; text-align: center;">
              <p style="margin: 0 0 10px;">*|LIST:COMPANY|* &middot; *|LIST:ADDRESS|*</p>
              <p style="margin: 0 0 10px;"><a href="*|UPDATE_PROFILE|*" style="color: #999999;">Update preferences</a> &middot; <a href="*|UNSUB|*" style="color: #999999;">Unsubscribe</a></p>
              <p style="margin: 0;">*|LIST:DESCRIPTION|*</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
